name: Keep backend awake

on:
  schedule:
    # Every 10 minutes — under Render free tier's 15-minute idle sleep threshold,
    # so the in-process hourly ingestion scheduler never gets paused mid-sleep.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: curl -sf "${{ vars.BACKEND_URL }}/api/health"
