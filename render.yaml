services:
  - type: web
    name: punjab-pulse-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: INGEST_TRIGGER_SECRET
        generateValue: true
      - key: GNEWS_API_KEY
        sync: false
